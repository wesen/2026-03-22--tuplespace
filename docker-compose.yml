services:
  postgres:
    image: postgres:16-alpine
    container_name: tuplespace-postgres
    environment:
      POSTGRES_DB: tuplespace
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "15433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tuplespace"]
      interval: 2s
      timeout: 2s
      retries: 20
    volumes:
      - tuplespace-postgres-data:/var/lib/postgresql/data

  tuplespaced:
    build:
      context: ..
      dockerfile: 2026-03-22--tuplespace/Dockerfile
    container_name: tuplespace-server
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      TUPLESPACE_DATABASE_URL: postgres://postgres:postgres@postgres:5432/tuplespace?sslmode=disable
      TUPLESPACE_HTTP_LISTEN_ADDR: :8080
      TUPLESPACE_CANDIDATE_LIMIT: "64"
    ports:
      - "18081:8080"
    command:
      - --log-format
      - json
      - --log-level
      - info

volumes:
  tuplespace-postgres-data:
